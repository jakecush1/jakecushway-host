    <style>
      #tools .tools-row {
        display: flex;
        width: 100%;
      }
      #tools .quadrant {
        flex: 1;
        height: 50vh;
        border: 10px solid #312450;
        box-sizing: border-box;
      }
      #tools .link-wrapper {
        display: block;
        height: 100%;
        width: 100%;
      }
      #tools .inner-content {
        height: 100%;
        width: 100%;
        background-size: cover;
        background-position: center;
        transition: filter 0.3s ease;
      }
      #tools .inner-content:hover {
        filter: brightness(0.7);
      }

      .projects-columns {
        display: flex;
        width: 100%;
        gap: 30px;
        align-items: flex-start;
        justify-content: center;
      }
      .projects-column {
        flex: 1 1 0;
        min-width: 0;
        max-width: 560px;
      }
      .projects-subhead {
        text-align: center;
        font-size: 0.8rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        opacity: 0.7;
        margin-bottom: 15px;
      }
      /* Two columns share the row, so drop the single-carousel width cap */
      .projects-column .slideshow-container {
        width: 100%;
        max-width: 100%;
        height: 50vh;
      }
      /* Let the image box shrink to the rendered image so the caption stays pinned to it */
      .projects-column .slideshow-container img {
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 35vh;
      }
      /* Fixed image band keeps the button rows aligned across columns and between slides */
      .projects-column .slide > div:first-child {
        height: 35vh;
        justify-content: center;
      }
      .projects-column .slideshow-container .prev,
      .projects-column .slideshow-container .next {
        z-index: 2;
      }
      @media screen and (max-width: 980px) {
        .projects-columns {
          flex-direction: column;
          align-items: center;
          gap: 0;
        }
        .projects-column {
          width: 100%;
          max-width: 666px;
        }
      }

      .slide-link {
        display: block;
        text-align: center;
        border-bottom: none;
      }
      .slide-link img {
        transition: filter 0.3s ease;
      }
      .slide-link:hover img {
        filter: brightness(0.7);
      }

      .info-modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }
      .info-modal-overlay.open {
        display: flex;
      }
      .info-modal {
        background: #312450;
        color: white;
        padding: 30px;
        border-radius: 12px;
        max-width: 90%;
        width: 520px;
        max-height: 80vh;
        overflow-y: auto;
        position: relative;
        text-align: left;
      }
      .info-modal h3 {
        margin-top: 0;
        padding-right: 25px;
      }
      .info-modal-body p {
        font-size: 0.95rem;
        line-height: 1.6;
        margin-bottom: 1em;
      }
      .info-modal-body p:last-child {
        margin-bottom: 0;
      }
      .info-modal-tech {
        margin-top: 20px;
        padding-top: 15px;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
      }
      .info-modal-tech .tech-label {
        display: block;
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.6;
        margin-bottom: 10px;
      }
      .info-modal-tech .tech-tag {
        display: inline-block;
        font-size: 0.75rem;
        line-height: 1;
        padding: 6px 10px;
        margin: 0 6px 6px 0;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.12);
      }
      .info-modal-close {
        position: absolute;
        top: 10px;
        right: 15px;
        cursor: pointer;
        font-size: 1.5rem;
        line-height: 1;
        color: white;
      }
    </style>

		<script>
			document.addEventListener('DOMContentLoaded', () => {
				const greetingElement = document.getElementById('greeting-header');
				const greetings = [
				"Hello!",     
				"Hola!",      
				"Bonjour!",   
				"Ciao!",      
				"Olá!",       
				"Hallo!",     
				"Здравствуйте!", 
				"こんにちは！",
				"안녕하세요!",
				"你好！"
				];
				let index = 0;

				// Ensure it has a transition
				greetingElement.style.transition = "opacity 1s ease-in-out";

				function cycleGreeting() {
				// Fade out
				greetingElement.style.opacity = 0;

				setTimeout(() => {
					// Change text while invisible
					greetingElement.textContent = greetings[index];
					index = (index + 1) % greetings.length;

					// Fade back in
					greetingElement.style.opacity = 1;
				}, 1000); // matches transition duration
				}

				// Start immediately
				greetingElement.textContent = greetings[index];
				index = (index + 1) % greetings.length;

				// Run every 3 seconds
				setInterval(cycleGreeting, 5000);
			});
		</script>

			/* Each .slideshow-container runs its own independent slideshow. */
			document.addEventListener('DOMContentLoaded', () => {
				document.querySelectorAll('.slideshow-container').forEach(container => {
					const slides = Array.from(container.querySelectorAll('.slide'));
					if (!slides.length) return;

					let index = 0;

					function showSlide(n) {
						index = (n + slides.length) % slides.length;
						slides.forEach((slide, i) => {
							slide.style.display = (i === index) ? 'block' : 'none';
						});
					}

					const prev = container.querySelector('.prev');
					const next = container.querySelector('.next');
					if (prev) prev.addEventListener('click', () => showSlide(index - 1));
					if (next) next.addEventListener('click', () => showSlide(index + 1));

					showSlide(0);
				});
			});
